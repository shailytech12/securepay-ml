<!DOCTYPE html>
<html>
<head>
    <title>Merchant Profile</title>

    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/css/style.css">

    <style>

        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: url("https://img.freepik.com/free-vector/abstract-technology-background_23-2148884153.jpg");
            background-size: cover;
            color: white;
        }

        .container {
            width: 700px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 20px;
            background: linear-gradient(135deg, #6a11cb, #ff5f6d);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        h2 {
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }

        .label {
            font-weight: bold;
        }

        .qr {
            text-align: center;
            margin-top: 30px;
        }

        .qr img {
            width: 180px;
            background: white;
            padding: 5px;
            border-radius: 10px;
        }

        .btn {

            margin: 10px 5px;

            padding: 10px 18px;

            border-radius: 10px;

            border: none;

            background: white;

            cursor: pointer;

            font-weight: bold;
        }

        .btn:hover {

            background: #f0f0f0;
        }

        .back {

            margin-top: 20px;

            text-align: center;
        }

        .back button {

            padding: 10px 20px;

            border-radius: 10px;

            border: none;

            background: #00c6ff;

            cursor: pointer;

            color: white;

            font-weight: bold;
        }

        .back button:hover {

            background: #0099cc;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>
        Merchant Profile - {{ merchant.name }}
    </h2>

    <div class="row">
        <div class="label">Full Name:</div>
        <div>{{ merchant.name }}</div>
    </div>

    <div class="row">
        <div class="label">Mobile Number:</div>
        <div>{{ merchant.mobile }}</div>
    </div>

    <div class="row">
        <div class="label">Email:</div>
        <div>{{ merchant.email }}</div>
    </div>

    <div class="row">
        <div class="label">Merchant UPI:</div>
        <div>{{ merchant.upi }}</div>
    </div>

    <div class="row">
        <div class="label">Category:</div>
        <div>{{ merchant.category }}</div>
    </div>

    <div class="row">
        <div class="label">Merchant Since:</div>

        <div>
            {{ merchant.created_at.strftime('%d-%m-%Y') }}
        </div>
    </div>



    <!-- QR SECTION -->

    <div class="qr">

        <img
            id="qrImage"
            src="/static/qr/{{ merchant.upi.replace('@','_') }}.png"
        >

        <p>Scan to Pay</p>


        <button class="btn" onclick="downloadQR()">
            Download QR
        </button>


        <button class="btn" onclick="shareQR()">
            Share QR
        </button>

    </div>

</div>



<div class="back">

    <a href="/merchant/dashboard">

        <button>
            Back to Dashboard
        </button>

    </a>

</div>



<script>

function downloadQR() {

    let qr = document.getElementById("qrImage");

    let link = document.createElement("a");

    link.href = qr.src;

    link.download = "merchant-qr-code.png";

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);
}



async function shareQR() {

    const qrImage = document.getElementById("qrImage");

    const response = await fetch(qrImage.src);

    const blob = await response.blob();

    const file = new File(
        [blob],
        "merchant-qr.png",
        { type: blob.type }
    );

    if (navigator.canShare && navigator.canShare({ files: [file] })) {

        await navigator.share({
            title: "Merchant QR Code",
            text: "Scan this QR to pay",
            files: [file]
        });

    } else {

        alert("Sharing not supported in this browser");

    }
}

</script>

</body>
</html>
