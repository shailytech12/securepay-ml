<!DOCTYPE html>
<html>
<head>
    <title>Become Merchant</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="login-body">

<div class="merchant-box">

    <!-- LEFT SIDE -->
    <div class="merchant-left">
        <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" width="120">
        <h2>Become a Merchant</h2>
    </div>

    <!-- RIGHT SIDE -->
    <div class="merchant-right">

        <h2>Setup Your Account</h2>
        <p>Complete your profile to start receiving payments.</p>

        <form method="POST">

           
            <input type="text" name="upi" 
value="{{ merchant.upi if merchant else '' }}" 
placeholder="example@upi" required>

            <select name="category">
                <option value="Education">Education</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Food">Food</option>
                <option value="Groceries">Groceries</option>
                <option value="Insurance">Insurance</option>
                <option value="Investment">Investment</option>
                <option value="Medical">Medical</option>
                <option value="Other">Other</option>
                <option value="Recharge">Recharge</option>
                <option value="Shopping">Shopping</option>
                <option value="Travel">Travel</option>
                <option value="Utilities">Utilities</option>
            </select>

            <button type="submit" class="setup-btn">Complete Setup</button>

        </form>

        <a href="/dashboard">
            <button class="cancel-btn">Cancel</button>
        </a>

    </div>

</div>

</body>
</html>
