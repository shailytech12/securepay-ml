<!DOCTYPE html>
<html>

<head>

    <title>Edit User</title>

    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- FLATPICKR -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>

.dob-wrapper{
    position: relative;
    width: 103%;
    margin-bottom: 1px;
}

#dob{
    width: 100%;
    height: 44px;
    padding: 0 45px 0 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    background: #f2f2f2;
    box-sizing: border-box;
}

.calendar-icon{
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    pointer-events: none;
}
.primary-btn{
    width: 103%;
    
    margin-top: 10px;
}

</style>

</head>

<body class="login-body">

<div class="form-container">

    <div class="right-box">

        <h2>Edit User</h2>

        <form method="POST">

            <!-- NAME -->
            <input type="text"
                   name="name"
                   value="{{ user.name }}"
                   required>

            <!-- EMAIL -->
            <input type="email"
                   name="email"
                   value="{{ user.email }}"
                   required>

            <!-- MOBILE -->
            <input type="text"
                   name="mobile"
                   value="{{ user.mobile }}"
                   required>

            <!-- DOB -->
            <div class="dob-wrapper">

                <input type="text"
                       id="dob"
                       name="dob"
                       value="{{ user.dob }}"
                       placeholder="Select DOB"
                       required>

                <span class="calendar-icon">📅</span>

            </div>

            <!-- ADDRESS -->
            <input type="text"
                   name="address"
                   value="{{ user.address }}"
                   required>

            <!-- ZIPCODE -->
            <input type="text"
                   name="zipcode"
                   value="{{ user.zipcode }}"
                   required>

            <!-- STATE -->
            <input type="text"
                   name="state"
                   value="{{ user.state }}"
                   required>

            <!-- BUTTON -->
            <button type="submit"
                    class="primary-btn">

                Update User

            </button>

        </form>

        <div style="text-align:center; margin-top:15px;">
            <a href="/admin/users">
                <button style="padding:10px 30px; background:#007bff; color:white; border:none; border-radius:10px; cursor:pointer; font-size:15px; transition:0.3s;"
                    onmouseover="this.style.background='#0056b3'" onmouseout="this.style.background='#007bff'">
                    ← Back to Users
                </button>
            </a>
        </div>

    </div>

</div>


<script>

flatpickr("#dob", {

    dateFormat: "d-m-Y",

    allowInput: true,

    maxDate: "today",

    monthSelectorType: "dropdown"

});

</script>

</body>

</html>
